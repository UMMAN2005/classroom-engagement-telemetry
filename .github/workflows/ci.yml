name: AI Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install pyyaml pandas scikit-learn

      - name: Lint with flake8 (fatal errors)
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (style warnings)
        run: |
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Smoke test (model architectures)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python -c "
          import torch
          from torchvision import models

          # ResNet18
          r = models.resnet18(weights=None)
          r.fc = torch.nn.Linear(512, 5)
          r.eval()
          out = r(torch.randn(1, 3, 224, 224))
          assert out.shape == (1, 5), f'ResNet18 output shape {out.shape}'

          # VGG16
          v = models.vgg16(weights=None)
          v.classifier[6] = torch.nn.Linear(4096, 5)
          v.eval()
          out = v(torch.randn(1, 3, 224, 224))
          assert out.shape == (1, 5), f'VGG16 output shape {out.shape}'

          print('Smoke test passed: ResNet18 and VGG16')
          "

project:
  name: "classroom_reaction_recognition"
  random_seed: 42

data:
  video_dir: "data/raw_videos"
  extracted_frames_dir: "data/extracted_frames"
  cropped_persons_dir: "data/crops"
  staging_dir: "data/crops/staging"
  frame_interval_seconds: 1

classes: ["Neutral", "Confused", "Smiling_Amused", "Surprised", "Bored_Tired"]

split:
  train_ratio: 0.70
  val_ratio: 0.10
  test_ratio: 0.20

model:
  detector: "src/models/yolov8n.pt"
  classifier_input_size: 224
  batch_size: 32
  epochs: 20
  learning_rate: 0.001

pipeline:
  detection_confidence_threshold: 0.5
